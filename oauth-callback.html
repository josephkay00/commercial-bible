<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Commercial Bible – QuickBooks Connection</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;max-width:850px;margin:50px auto;padding:0 20px;color:#222}
    .card{border:1px solid #ddd;border-radius:10px;padding:24px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    h1{margin-top:0}
    label{display:block;font-weight:700;margin-top:18px}
    textarea,input{width:100%;box-sizing:border-box;padding:10px;margin-top:6px;font-family:monospace}
    button{margin-top:10px;padding:10px 16px;cursor:pointer}
    .ok{color:#176b2c}
    .err{color:#a40000}
    .small{font-size:13px;color:#555}
  </style>
</head>
<body>
  <div class="card">
    <h1>Commercial Bible – QuickBooks Connection</h1>
    <p id="status">Reading the QuickBooks response…</p>

    <div id="success" hidden>
      <p class="ok"><strong>QuickBooks authorised successfully.</strong></p>

      <label for="code">Authorization code</label>
      <textarea id="code" rows="5" readonly></textarea>
      <button type="button" onclick="copyField('code')">Copy authorization code</button>

      <label for="realmId">Realm ID</label>
      <input id="realmId" readonly>
      <button type="button" onclick="copyField('realmId')">Copy Realm ID</button>

      <label for="state">State</label>
      <input id="state" readonly>
      <button type="button" onclick="copyField('state')">Copy state</button>

      <p class="small">Return to Commercial Bible and paste the requested values. Do not share the authorization code with anyone.</p>
    </div>

    <div id="failure" hidden>
      <p class="err"><strong>QuickBooks did not complete the connection.</strong></p>
      <p id="errorText"></p>
    </div>
  </div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const realmId = params.get('realmId');
  const state = params.get('state');
  const error = params.get('error');
  const errorDescription = params.get('error_description');

  if (error) {
    document.getElementById('status').textContent = 'Connection failed.';
    document.getElementById('failure').hidden = false;
    document.getElementById('errorText').textContent =
      error + (errorDescription ? ': ' + errorDescription : '');
    return;
  }

  if (!code || !realmId) {
    document.getElementById('status').textContent = 'No authorization response was found in the URL.';
    document.getElementById('failure').hidden = false;
    document.getElementById('errorText').textContent =
      'Start the connection from Commercial Bible and try again.';
    return;
  }

  document.getElementById('status').textContent = 'Connection response received.';
  document.getElementById('success').hidden = false;
  document.getElementById('code').value = code;
  document.getElementById('realmId').value = realmId;
  document.getElementById('state').value = state || '';
})();

async function copyField(id) {
  const element = document.getElementById(id);
  const value = element.value;
  try {
    await navigator.clipboard.writeText(value);
  } catch (_) {
    element.focus();
    element.select();
    document.execCommand('copy');
  }
}
</script>
</body>
</html>
